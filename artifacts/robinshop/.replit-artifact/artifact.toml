kind = "web"
previewPath = "/"
title = "RobinShop AI"
version = "1.0.0"
id = "artifacts/robinshop"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21523

[services.development]
run = "pnpm --filter @workspace/robinshop run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/robinshop", "run", "build" ]
publicDir = "artifacts/robinshop/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21523"
BASE_PATH = "/"
