openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: RobinShop AI API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: stores
  - name: products
  - name: analytics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /stores:
    get:
      operationId: listStores
      tags: [stores]
      summary: List the current user's stores
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Store"
    post:
      operationId: createStore
      tags: [stores]
      summary: Create a new AI-generated store
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStoreInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"

  /stores/dashboard-summary:
    get:
      operationId: getDashboardSummary
      tags: [stores]
      summary: Aggregated stats across the user's stores
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /stores/{id}:
    get:
      operationId: getStore
      tags: [stores]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"
    patch:
      operationId: updateStore
      tags: [stores]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStoreInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"
    delete:
      operationId: deleteStore
      tags: [stores]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  /stores/{id}/visit:
    post:
      operationId: trackStoreVisit
      tags: [analytics]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CounterResponse"

  /stores/{id}/products:
    get:
      operationId: listStoreProducts
      tags: [products]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: regenerateStoreProducts
      tags: [products]
      summary: Regenerate AI products for a store
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /products/{productId}:
    get:
      operationId: getProduct
      tags: [products]
      parameters:
        - in: path
          name: productId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{productId}/view:
    post:
      operationId: trackProductView
      tags: [analytics]
      parameters:
        - in: path
          name: productId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CounterResponse"

  /public/stores/{slug}:
    get:
      operationId: getPublicStore
      tags: [stores]
      summary: Public store by slug (no auth)
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicStorePayload"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    CreateStoreInput:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        niche: { type: string, minLength: 1 }
        description: { type: string }
      required: [name, niche, description]

    UpdateStoreInput:
      type: object
      properties:
        name: { type: string }
        niche: { type: string }
        description: { type: string }
        tagline: { type: string }
        themeName: { type: string }
        themeStyle: { type: string }
        primaryColor: { type: string }
        accentColor: { type: string }
        homepageHeadline: { type: string }
        homepageBody: { type: string }

    Store:
      type: object
      properties:
        id: { type: string }
        slug: { type: string }
        name: { type: string }
        niche: { type: string }
        description: { type: string }
        tagline: { type: string }
        themeName: { type: string }
        themeStyle: { type: string }
        primaryColor: { type: string }
        accentColor: { type: string }
        homepageHeadline: { type: string }
        homepageBody: { type: string }
        visits: { type: integer }
        productCount: { type: integer }
        createdAt: { type: string, format: date-time }
      required: [id, slug, name, niche, description, tagline, themeName, themeStyle, primaryColor, accentColor, homepageHeadline, homepageBody, visits, productCount, createdAt]

    Product:
      type: object
      properties:
        id: { type: string }
        storeId: { type: string }
        name: { type: string }
        description: { type: string }
        price: { type: number }
        imageUrl: { type: string }
        views: { type: integer }
        createdAt: { type: string, format: date-time }
      required: [id, storeId, name, description, price, imageUrl, views, createdAt]

    CounterResponse:
      type: object
      properties:
        count: { type: integer }
      required: [count]

    DashboardSummary:
      type: object
      properties:
        totalStores: { type: integer }
        totalProducts: { type: integer }
        totalVisits: { type: integer }
        totalProductViews: { type: integer }
        topStores:
          type: array
          items:
            $ref: "#/components/schemas/Store"
        recentProducts:
          type: array
          items:
            $ref: "#/components/schemas/Product"
      required: [totalStores, totalProducts, totalVisits, totalProductViews, topStores, recentProducts]

    PublicStorePayload:
      type: object
      properties:
        store:
          $ref: "#/components/schemas/Store"
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
      required: [store, products]
