openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: RobinShop AI API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: stores
  - name: products
  - name: marketing
  - name: dropshipping
  - name: analytics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /stores:
    get:
      operationId: listStores
      tags: [stores]
      summary: List the current user's stores
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Store"
    post:
      operationId: createStore
      tags: [stores]
      summary: Create a new AI-generated store
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStoreInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"

  /stores/dashboard-summary:
    get:
      operationId: getDashboardSummary
      tags: [stores]
      summary: Aggregated stats across the user's stores
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /stores/{id}:
    get:
      operationId: getStore
      tags: [stores]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"
    patch:
      operationId: updateStore
      tags: [stores]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStoreInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"
    delete:
      operationId: deleteStore
      tags: [stores]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  /stores/{id}/visit:
    post:
      operationId: trackStoreVisit
      tags: [analytics]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CounterResponse"

  /stores/{id}/products:
    get:
      operationId: listStoreProducts
      tags: [products]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Manually create a product in a store
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /stores/{id}/products/regenerate:
    post:
      operationId: regenerateStoreProducts
      tags: [products]
      summary: Regenerate AI products for a store
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /products/{productId}:
    get:
      operationId: getProduct
      tags: [products]
      parameters:
        - in: path
          name: productId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    patch:
      operationId: updateProduct
      tags: [products]
      parameters:
        - in: path
          name: productId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      parameters:
        - in: path
          name: productId
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  /products/{productId}/improve:
    post:
      operationId: improveProduct
      tags: [products]
      summary: Use AI to rewrite the description and compute a conversion-potential score
      parameters:
        - in: path
          name: productId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{productId}/click:
    post:
      operationId: trackProductClick
      tags: [analytics]
      parameters:
        - in: path
          name: productId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CounterResponse"

  /products/{productId}/view:
    post:
      operationId: trackProductView
      tags: [analytics]
      parameters:
        - in: path
          name: productId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CounterResponse"

  /stores/{id}/marketing:
    get:
      operationId: listMarketingAssets
      tags: [marketing]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MarketingAsset"
    post:
      operationId: generateMarketingAsset
      tags: [marketing]
      summary: Generate AI marketing content for a store
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateMarketingAssetInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketingAsset"

  /stores/{id}/marketing/pack:
    get:
      operationId: getMarketingPack
      tags: [marketing]
      summary: Download a single bundled marketing pack (markdown) of all assets for a store
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            text/markdown:
              schema: { type: string }

  /marketing/{assetId}:
    delete:
      operationId: deleteMarketingAsset
      tags: [marketing]
      parameters:
        - in: path
          name: assetId
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  /stores/{id}/import-from-url:
    post:
      operationId: importProductFromUrl
      tags: [products]
      summary: Import an affiliate product from an Amazon/AliExpress/eBay URL
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportFromUrlInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /stores/{id}/dropshipping:
    get:
      operationId: getDropshipSuggestions
      tags: [dropshipping]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: query
          name: region
          required: false
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DropshipResponse"

  /public/stores/{slug}:
    get:
      operationId: getPublicStore
      tags: [stores]
      summary: Public store by slug (no auth)
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicStorePayload"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    LanguageCode:
      type: string
      enum: [en, fr, es, ar, sw]

    MarketingType:
      type: string
      enum: [tiktok, instagram, email, seo]

    ProductSource:
      type: string
      enum: [ai, manual, dropship]

    CreateStoreInput:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        niche: { type: string, minLength: 1 }
        description: { type: string }
        language:
          $ref: "#/components/schemas/LanguageCode"
      required: [name, niche, description]

    UpdateStoreInput:
      type: object
      properties:
        name: { type: string }
        niche: { type: string }
        description: { type: string }
        language:
          $ref: "#/components/schemas/LanguageCode"
        tagline: { type: string }
        themeName: { type: string }
        themeStyle: { type: string }
        primaryColor: { type: string }
        accentColor: { type: string }
        homepageHeadline: { type: string }
        homepageBody: { type: string }

    Store:
      type: object
      properties:
        id: { type: string }
        slug: { type: string }
        name: { type: string }
        niche: { type: string }
        description: { type: string }
        language: { type: string }
        tagline: { type: string }
        themeName: { type: string }
        themeStyle: { type: string }
        primaryColor: { type: string }
        accentColor: { type: string }
        homepageHeadline: { type: string }
        homepageBody: { type: string }
        visits: { type: integer }
        productCount: { type: integer }
        createdAt: { type: string, format: date-time }
      required: [id, slug, name, niche, description, language, tagline, themeName, themeStyle, primaryColor, accentColor, homepageHeadline, homepageBody, visits, productCount, createdAt]

    Product:
      type: object
      properties:
        id: { type: string }
        storeId: { type: string }
        name: { type: string }
        description: { type: string }
        price: { type: number }
        imageUrl: { type: string }
        source: { type: string }
        category: { type: string }
        affiliateUrl: { type: string }
        affiliateSource: { type: string }
        conversionScore: { type: integer }
        views: { type: integer }
        clicks: { type: integer }
        createdAt: { type: string, format: date-time }
      required: [id, storeId, name, description, price, imageUrl, source, category, affiliateUrl, affiliateSource, conversionScore, views, clicks, createdAt]

    AffiliateSource:
      type: string
      enum: [amazon, aliexpress, ebay]

    ImportFromUrlInput:
      type: object
      properties:
        productUrl: { type: string, minLength: 4 }
        source:
          $ref: "#/components/schemas/AffiliateSource"
      required: [productUrl, source]

    CreateProductInput:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        description: { type: string }
        price: { type: number }
        imageUrl: { type: string }
        category: { type: string }
        source:
          $ref: "#/components/schemas/ProductSource"
      required: [name, description, price]

    UpdateProductInput:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        price: { type: number }
        imageUrl: { type: string }
        category: { type: string }
        source:
          $ref: "#/components/schemas/ProductSource"

    MarketingAsset:
      type: object
      properties:
        id: { type: string }
        storeId: { type: string }
        type: { type: string }
        title: { type: string }
        content: { type: string }
        language: { type: string }
        createdAt: { type: string, format: date-time }
      required: [id, storeId, type, title, content, language, createdAt]

    GenerateMarketingAssetInput:
      type: object
      properties:
        type:
          $ref: "#/components/schemas/MarketingType"
      required: [type]

    DropshipItem:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        estimatedPrice: { type: number }
        trendScore: { type: integer }
        platform: { type: string }
        platformUrl: { type: string }
      required: [name, description, estimatedPrice, trendScore, platform, platformUrl]

    DropshipResponse:
      type: object
      properties:
        region: { type: string }
        platforms:
          type: array
          items: { type: string }
        items:
          type: array
          items:
            $ref: "#/components/schemas/DropshipItem"
      required: [region, platforms, items]

    CounterResponse:
      type: object
      properties:
        count: { type: integer }
      required: [count]

    DashboardSummary:
      type: object
      properties:
        totalStores: { type: integer }
        totalProducts: { type: integer }
        totalVisits: { type: integer }
        totalProductViews: { type: integer }
        topStores:
          type: array
          items:
            $ref: "#/components/schemas/Store"
        recentProducts:
          type: array
          items:
            $ref: "#/components/schemas/Product"
      required: [totalStores, totalProducts, totalVisits, totalProductViews, topStores, recentProducts]

    PublicStorePayload:
      type: object
      properties:
        store:
          $ref: "#/components/schemas/Store"
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
      required: [store, products]
